<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green</title>
  <link rel="stylesheet" href="../../style/styles.css">
  <link rel="stylesheet" href="product.css">
</head>
<body>

  <header>
    <a href="../products/products.html" class="brand">
      <img src="../../assets/general/logo.d" alt="logo">
      <span>Green</span>
    </a>
    <nav>
      <a href="../wishlist/wishlist.html">wishlist (<span id="wl-count">0</span>)</a>
      <a href="../cart/cart.html">cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main class="detail-page">

    <a href="../products/products.html" class="back-link">← back to shop</a>

    <!-- loading state -->
    <div id="loading-state" class="state-loading">
      loading item…
    </div>

    <!-- error state -->
    <div id="error-state" class="state-error">
      <p>item not found.</p>
      <a href="../products/products.html">return to shop</a>
    </div>

    <!-- ═══ card 1: image + info ═══════════════════════════════ -->
    <div id="detail-content" class="detail-content">

      <div class="detail-top-card">

        <!-- left: image -->
        <div class="detail-img-box">
          <img id="detail-img" src="" alt="" onerror="this.src='../../assets/general/placeholder.png'">
        </div>

        <!-- right: info -->
        <div class="detail-info">

          <h1 id="detail-name" class="detail-name"></h1>

          <p class="detail-meta">
            <span id="detail-category"></span>
            <span class="meta-divider">|</span>
            <span id="detail-rarity"></span>
          </p>

          <hr class="divider">

          <p id="detail-price" class="detail-price"></p>

          <hr class="divider">

          <div class="quantity-row">
            <span class="quantity-label">quantity</span>
            <div class="qty-control">
              <button onclick="changeqty(-1)">−</button>
              <input type="number" id="qty-input" value="1" min="1" max="99" readonly>
              <button onclick="changeqty(1)">+</button>
            </div>
          </div>

          <div class="action-row">
            <button id="add-cart-btn" class="btn-add-cart" onclick="handleaddtocart()">
              add to cart
            </button>
            <button id="wishlist-btn" class="btn-wishlist" onclick="handlewishlist()" title="add to wishlist">
              ♡
            </button>
          </div>

        </div>
      </div>

      <!-- ═══ card 2: description ═════════════════════════════ -->
      <div class="detail-desc-card">
        <h2 class="desc-heading">description</h2>
        <div id="detail-desc" class="desc-body"></div>
      </div>

    </div>

  </main>

  <script type="module" src="productdetails.js"></script>
</body>
</html>
